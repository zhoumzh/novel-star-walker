<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🧭 Starry Abyss Wanderer - Panoramic Geography Map</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a1628;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      color: #c0d0e8;
    }
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #0d1b2a;
      box-shadow: inset 0 0 50px rgba(0, 10, 30, 0.6);
    }
    
    /* 顶部悬浮面板 */
    .top-panel {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 100;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      pointer-events: auto;
    }
    .title-card {
      background: rgba(15,25,45,0.9);
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: 1px solid rgba(100,160,255,0.3);
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .title-card h4 {
      margin: 0;
      font-size: 0.95rem;
      color: #e0ecff;
      font-family: Georgia, serif;
      font-weight: bold;
    }
    .title-card span {
      font-size: 0.65rem;
      color: rgba(180,200,230,0.7);
      display: block;
      margin-top: 0.1rem;
    }

    /* 右侧信息面板 */
    .detail-panel {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 340px;
      max-height: calc(100vh - 2rem);
      z-index: 100;
      display: flex;
      flex-direction: column;
      background: rgba(10,20,40,0.92);
      border: 1px solid rgba(100,140,200,0.3);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      color: #c0d0e8;
      border-radius: 0.75rem;
      overflow: hidden;
      transition: all 0.3s ease-in-out;
    }

    .panel-content {
      padding: 1rem;
      overflow-y: auto;
      flex: 1;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(10, 20, 35, 0.5);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(100, 140, 200, 0.4);
      border-radius: 2px;
    }
    
    /* 列表与按钮 */
    .landmark-tag {
      font-size: 0.7rem;
      color: #fff;
      background: rgba(60,90,140,0.6);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
    }
    .landmark-title {
      margin: 0.2rem 0 0 0;
      font-size: 1.25rem;
      color: #e0ecff;
      font-family: Georgia, serif;
      font-weight: bold;
    }
    .adjacent-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.3rem;
    }
    .adjacent-btn {
      font-size: 0.75rem;
      background: rgba(60,90,140,0.4);
      border: 1px solid rgba(100,140,200,0.3);
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      color: #c0d0e8;
      cursor: pointer;
      transition: all 0.2s;
    }
    .adjacent-btn:hover {
      background: rgba(80,120,180,0.6);
      color: #fff;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(140,180,230,0.6);
      text-align: center;
      padding: 3rem 0;
    }

    /* 闪烁脉动 */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* 点击与选中地标高亮 */
    g[data-id] {
      transition: transform 0.2s;
    }
    g[data-id]:hover {
      filter: drop-shadow(0px 0px 4px rgba(255, 170, 68, 0.8));
    }
    .selected-node circle {
      stroke: #ffaa44 !important;
    }
    .selected-node text {
      fill: #ffcc66 !important;
      font-weight: bold !important;
    }
    .selected-ring {
      display: block !important;
    }
  </style>
</head>

  <script>
    const locations = [{"id":"loc_deep_green_forest","type":"Location","name":"Ma Juan Landing Point","properties":{"description":"The initial location where the protagonist Ma Juan materialized and landed on Planet Rahm from Earth's Night City across a rift in space-time, located on the eastern edge of the anti-magic 'Green Sea' (Deep Green Forest). A massive blue rift anomaly once streaked across the sky, leaving a strong beacon of gravitational ripples. This place is remote and desolate, hidden under ancient trees, and relatively close to Sunset Town.","ecologicalRules":"由于高密度‘箭木’对活性暗能粒子（魔能）的极端吸收与禁锁，绿海区域形成了一个广阔的物理禁魔死区。\n1. 暗能受体与逆向戒断（脱力症状）：拉姆星生灵细胞中进化有‘魔导受体（暗能受体）’，即便不会法术的平民与地精也自带微弱电位。在极度缺魔的绿海中，他们会产生严重的‘逆向戒断反应’，表现为全身酸软脱力、无法导航。主角马倦作为地球人类，完全没有这种魔导受体（零受体体质），因此进入其中行动如常，毫发无损；\n2. 精灵与巨魔的受体脑部制约与自然魔法：绿海的精灵和巨魔世世代代繁衍，演化出了‘受体脑部限制/低表达’以免疫戒断反应。他们无法使用帝国那种毁天灭地的宏观法术，只能使用特有的‘自然系魔法’（本质上是通过生物电磁信号与植物、真菌进行波谱共振，达到催生植物或安抚野兽的辅助效果），防卫主要依赖物理弓箭与强横的肉搏力量。外界的法师高手一旦强行闯入，立刻魔力尽失且全身瘫痪，会被这些本土猎手物理绞杀，因此没人敢强攻绿海；\n3. 纯物理野兽：绿海内部没有游离暗能，无法供养带魔晶核的魔兽。丛林内仅繁衍有极度危险的普通野生野兽（靠利爪、牙齿和毒素物理捕食）；\n4. 为什么不能放火烧林？：帝国等势力对绿海觊觎已久却绝对无法纵火，主要原因有两个：一是绿海内部为禁魔场域，一切火系魔法飞入绿海瞬间就会因魔能被剥离而自行熄灭；二是绿海占拉姆星面积接近一半，自成庞大的独立气候体系，其外围边界终年笼罩着高密度的降雨带与终日不散的湿冷浓雾。任何物理纵火在边界的持续暴雨和极高植被含水量面前，连起火点都无法维持，更遑论朝内部蔓延。","sensoryDetails":{"sight":"Desolate clearing hidden under ancient trees, faint gravitational ripples in the air, and a fading blue rift signature in the sky.","sound":"Absolute silence of the anti-magic forest, faint electromagnetic humming from the landing rift, and rustling of leaves.","smell":"Damp forest soil, sweet rot of decaying wood, and a sharp trace of ozone from the space-time portal."},"mapX":27,"mapY":27},"relations":[{"predicate":"LOCATED_IN","targetId":"loc_ram_planet"},{"predicate":"CONNECTED_TO","targetId":"loc_border_town"},{"predicate":"CONNECTED_TO","targetId":"loc_mirror_lake"},{"predicate":"CONNECTED_TO","targetId":"loc_holy_tree_lake"}]},{"id":"loc_despair_abyss","type":"Location","name":"Despair Abyss","properties":{"descripti     // 选择地标逻辑
    function selectNode(id) {
      if (selectedId) {

          prevNode.classList.remove('selected-node');
          const ring = prevNode.querySelector('circle[stroke="#ffcc66"]');
          if (ring) ring.style.display = 'none';
        }
      }

      if (selectedId === id) {
        selectedId = null;
      } else {
        selectedId = id;
        const nextNode = document.querySelector('g[data-id="' + id + '"]');
        if (nextNode) {
          nextNode.classList.add('selected-node');

      updatePanel();
    }
    window.selectNode = selectNode;

    // 绑定事件到所有 SVG 主要地标上
    document.querySelectorAll('g[data-id]').forEach(el => {
      // 预置 selected ring 样式隐藏
      const ring = el.querySelector('circle[stroke="#ffcc66"]');
      if (ring) ring.style.display = 'none';

      el.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = this.getAttribute('data-id');
        window.selectNode(id);
      });
    });

    // 背景点击取消选中
    document.querySelector('svg').addEventListener('click', function() {
      if (selectedId) {
        window.selectNode(selectedId);
      }
    });

    // 初始化面板
    updatePanel();
  </script>
</body>
</html>
